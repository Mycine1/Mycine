<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream Premium - Multi-Lang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #e50914; --dark: #050505; --card: #121212; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Header */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: bold; }
        .logo span { color: var(--red); }

        /* Full Screen Search Page */
        #searchPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 3500; display: none; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .search-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .search-input-wrapper { flex-grow: 1; position: relative; }
        .search-input-wrapper input { width: 100%; padding: 12px 15px; border-radius: 8px; border: none; background: #1a1a1a; color: white; font-size: 16px; outline: none; border: 1px solid #333; }
        .search-results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }

        /* Hero Slider */
        .hero { height: 70vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 30px; position: relative; transition: background-image 0.8s ease-in-out; }
        .hero-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, var(--dark) 15%, transparent); }
        .hero-content { z-index: 10; max-width: 90%; }

        /* Rows */
        .row-title { padding: 25px 20px 5px; font-size: 16px; font-weight: 700; display: flex; align-items: center; text-transform: uppercase; }
        .row-title::before { content: ''; border-left: 4px solid var(--red); height: 18px; margin-right: 12px; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 15px 20px; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }

        /* Top 10 & Movie Cards */
        .t10-item { position: relative; min-width: 155px; height: 230px; margin-left: 35px; }
        .t10-num { position: absolute; left: -40px; bottom: -15px; font-size: 90px; font-weight: 900; color: transparent; -webkit-text-stroke: 2px var(--red); z-index: 1; }
        .t10-item img, .movie-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; position: relative; z-index: 2; }
        .movie-card { min-width: 130px; height: 195px; border-radius: 10px; overflow: hidden; background: var(--card); flex-shrink: 0; }

        /* Details Modal */
        #detailsPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 3000; display: none; overflow-y: auto; padding-bottom: 100px; }
        .det-hero { height: 45vh; background-size: cover; background-position: center; position: relative; }
        .det-info { padding: 25px; margin-top: -60px; position: relative; background: linear-gradient(to top, var(--dark) 85%, transparent); border-radius: 30px 30px 0 0; }
        
        /* Language/Server Buttons */
        .server-options { display: flex; gap: 10px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .server-btn { background: #222; color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .server-btn.active { background: var(--red); border-color: var(--red); }

        .actor-item { display: flex; align-items: center; gap: 15px; background: #111; padding: 12px; border-radius: 15px; margin-bottom: 12px; }
        .actor-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index: 2500; }
        .nav-item { color: #777; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: white; }

        #playerBox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Cine<span>Stream</span></div>
        <div onclick="openSearch()"><i class="fa-solid fa-magnifying-glass" style="font-size: 20px;"></i></div>
    </header>

    <div id="searchPage">
        <div class="search-header">
            <i class="fa-solid fa-arrow-left" onclick="closeSearch()" style="font-size: 22px;"></i>
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" placeholder="Search movies or series..." oninput="doSearch(this.value)">
            </div>
        </div>
        <div class="search-results-grid" id="searchGrid"></div>
    </div>

    <main id="mainUI">
        <section class="hero" id="heroBox">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 id="hTitle" style="margin:0; font-size: 2.2rem;">Loading...</h1>
                <div style="margin: 10px 0; font-size: 14px;">
                    <span id="hRate" style="color: gold;"></span> • <span id="hYear"></span>
                </div>
                <p id="hDesc" style="font-size: 13px; opacity: 0.8; margin-bottom: 20px;"></p>
                <button onclick="heroAction()" style="background: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold;"><i class="fa-solid fa-play"></i> Play Now</button>
            </div>
        </section>

        <div class="row-title">Top <span>10</span> Content Today</div>
        <div class="carousel" id="t10List"></div>

        <div class="row-title">Trending Now</div>
        <div class="carousel" id="trendList"></div>

        <div class="row-title">Popular Series</div>
        <div class="carousel" id="nflxList"></div>
    </main>

    <div id="detailsPage">
        <div class="det-hero" id="detBanner">
            <div style="position: absolute; top: 20px; left: 20px; font-size: 24px;" onclick="closeDetails()"><i class="fa-solid fa-arrow-left"></i></div>
        </div>
        <div class="det-info">
            <h1 id="detT" style="margin:0;"></h1>
            
            <div style="margin-top: 15px; font-size: 14px; font-weight: bold; color: var(--red);">SELECT SERVER (Multi-Language)</div>
            <div class="server-options">
                <button class="server-btn active" onclick="switchServer(1)">Server 1 (Hindi/Eng)</button>
                <button class="server-btn" onclick="switchServer(2)">Server 2 (Multi)</button>
                <button class="server-btn" onclick="switchServer(3)">Server 3 (Subtitles)</button>
            </div>

            <p id="detD" style="font-size: 14px; color: #ccc; margin: 20px 0;"></p>
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button id="detPlay" style="background: white; color: black; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; flex: 1;"><i class="fa-solid fa-play"></i> PLAY</button>
                <button style="background: #222; color: white; border: none; padding: 12px 25px; border-radius: 10px;"><i class="fa-solid fa-download"></i></button>
            </div>

            <h3 style="border-left: 3px solid var(--red); padding-left: 10px;">Cast</h3>
            <div id="castList"></div>
        </div>
    </div>

    <div id="playerBox">
        <div onclick="closePlayer()" style="position:fixed; top:20px; left:20px; z-index:4100; color:white; font-size:30px;">&times;</div>
        <iframe id="videoIframe" src="" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="location.reload()"><i class="fa-solid fa-house"></i>Home</a>
        <a href="#" class="nav-item" onclick="openSearch()"><i class="fa-solid fa-magnifying-glass"></i>Search</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-bars"></i>Menu</a>
    </nav>

    <script>
        const API_KEY = '8fb914f298b90c2e92d9cec6a1c3b08f';
        const IMG = 'https://image.tmdb.org/t/p/w500';
        const BIG_IMG = 'https://image.tmdb.org/t/p/original';

        let heroData = []; let heroIdx = 0;
        let currentMovieId = null;
        let currentMediaType = 'movie';

        async function startApp() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
            const data = await res.json();
            heroData = data.results.slice(0, 5);
            initSlider();
            renderItems(data.results.slice(0, 10), 't10List', true);
            renderItems(data.results.slice(10, 20), 'trendList');
            const resS = await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`);
            const dataS = await resS.json();
            renderItems(dataS.results, 'nflxList');
        }

        function renderItems(data, divId, isT10 = false) {
            const div = document.getElementById(divId);
            div.innerHTML = data.map((m, i) => `
                <div class="${isT10 ? 't10-item' : 'movie-card'}" onclick="loadDetails(${m.id}, '${m.media_type || (divId==='nflxList'?'tv':'movie')}')">
                    ${isT10 ? `<span class="t10-num">${i+1}</span>` : ''}
                    <img src="${IMG + m.poster_path}">
                </div>
            `).join('');
        }

        function initSlider() {
            setInterval(() => { heroIdx = (heroIdx + 1) % heroData.length; updateHeroUI(); }, 5000);
            updateHeroUI();
        }

        function updateHeroUI() {
            const m = heroData[heroIdx];
            document.getElementById('heroBox').style.backgroundImage = `linear-gradient(to top, var(--dark) 15%, transparent), url(${BIG_IMG + m.backdrop_path})`;
            document.getElementById('hTitle').innerText = m.title || m.name;
            document.getElementById('hRate').innerText = "⭐ " + m.vote_average.toFixed(1);
            document.getElementById('hYear').innerText = (m.release_date || m.first_air_date || "").split('-')[0];
            document.getElementById('hDesc').innerText = m.overview.slice(0, 100) + "...";
        }

        function heroAction() { loadDetails(heroData[heroIdx].id, heroData[heroIdx].media_type || 'movie'); }

        function openSearch() { document.getElementById('searchPage').style.display = 'block'; document.getElementById('searchInput').focus(); }
        function closeSearch() { document.getElementById('searchPage').style.display = 'none'; }

        async function doSearch(q) {
            if(q.length < 2) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
            const data = await res.json();
            document.getElementById('searchGrid').innerHTML = data.results.filter(m => m.poster_path).map(m => `
                <div onclick="loadDetails(${m.id}, '${m.media_type}')"><img src="${IMG + m.poster_path}" style="width:100%; border-radius:8px;"></div>
            `).join('');
        }

        async function loadDetails(id, type) {
            currentMovieId = id; currentMediaType = type;
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=credits`);
            const m = await res.json();
            document.getElementById('detBanner').style.backgroundImage = `linear-gradient(to top, var(--dark), transparent), url(${BIG_IMG + m.backdrop_path})`;
            document.getElementById('detT').innerText = m.title || m.name;
            document.getElementById('detD').innerText = m.overview;
            document.getElementById('castList').innerHTML = m.credits.cast.slice(0, 5).map(c => `
                <div class="actor-item"><img src="${c.profile_path ? IMG + c.profile_path : 'https://via.placeholder.com/100'}"><span>${c.name}</span></div>
            `).join('');
            document.getElementById('detPlay').onclick = () => switchServer(1);
            document.getElementById('detailsPage').style.display = 'block';
        }

        function switchServer(num) {
            const p = document.getElementById('videoIframe');
            const btns = document.querySelectorAll('.server-btn');
            btns.forEach((b, i) => b.classList.toggle('active', i === (num-1)));
            
            let url = "";
            if(num === 1) url = `https://vidsrc.me/embed/${currentMediaType}?tmdb=${currentMovieId}`;
            if(num === 2) url = `https://vidsrc.xyz/embed/${currentMediaType}?tmdb=${currentMovieId}`;
            if(num === 3) url = `https://embed.su/embed/${currentMediaType}/${currentMovieId}`;
            
            p.src = url;
            document.getElementById('playerBox').style.display = 'block';
        }

        function closeDetails() { document.getElementById('detailsPage').style.display = 'none'; }
        function closePlayer() { document.getElementById('playerBox').style.display = 'none'; document.getElementById('videoIframe').src = ''; }

        startApp();
    </script>
</body>
</html>
